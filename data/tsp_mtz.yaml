# 5-city TSP with MTZ subtour elimination
# Optimal tour: 0→1→3→4→2→0 = 10+25+15+20+15 = 85
# Expected: obj=85.0

N: [0, 1, 2, 3, 4]

n_cities: 5

# dist[i,j]: 5x5 = 25 entries (symmetric)
dist:
  # from 0
  - 0
  - 10
  - 15
  - 20
  - 25
  # from 1
  - 10
  - 0
  - 35
  - 25
  - 30
  # from 2
  - 15
  - 35
  - 0
  - 30
  - 20
  # from 3
  - 20
  - 25
  - 30
  - 0
  - 15
  # from 4
  - 25
  - 30
  - 20
  - 15
  - 0

# mtz_ub[i,j]: 5x5 = 25 entries
# 0 when i>=1, j>=1, i!=j (active MTZ constraint)
# 10 otherwise (deactivated: depot or self-loop)
mtz_ub:
  # i=0 (depot row — all deactivated)
  - 10
  - 10
  - 10
  - 10
  - 10
  # i=1
  - 10
  - 10
  - 0
  - 0
  - 0
  # i=2
  - 10
  - 0
  - 10
  - 0
  - 0
  # i=3
  - 10
  - 0
  - 0
  - 10
  - 0
  # i=4
  - 10
  - 0
  - 0
  - 0
  - 10
